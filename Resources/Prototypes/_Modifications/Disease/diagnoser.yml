- type: entity
  name: медицинская квитанция
  parent: Paper
  id: DiagnosisReportPaperNox
  description: С тобой всё хорошо!
  components:
  - type: Sprite
    sprite: Objects/Misc/bureaucracy.rsi
    layers:
    - state: paper_receipt
    - state: paper_receipt_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: PaperVisuals
    backgroundImagePath: "/Textures/Interface/Paper/paper_background_perforated.svg.96dpi.png"
    headerImagePath: "/Textures/Interface/Paper/paper_heading_virus.svg.96dpi.png"
    headerMargin: 0.0, 0.0, 0.0, 6.0
    backgroundImageTile: true
    backgroundPatchMargin: 0.0, 6.0, 0.0, 6.0
    contentMargin: 30.0, 0.0, 30.0, 0.0
    maxWritableArea: 300.0, 0.0

- type: entity
  parent: BaseComputerAiAccess
  id: ComputerDiagnoserConsole
  name: консоль диагноста заболеваний
  description: Центральный элемент системы вирусологии, величайшего достижения медицины. В нём множество портов и проводов.
  components:
  - type: DeviceList
  - type: DeviceNetwork
    deviceNetId: Wired
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      sprite: _Modifications/Disease/computers.rsi
      state: diagnost_display
    - map: ["computerLayerKeys"]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: Computer
    board: ComputerDiagnoserConsoleCircuitboard
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#1f8c28"
  - type: DeviceLinkSource
    range: 50
    ports:
      - DiseaseDiagnoserSender
      - DiseaseDiagnoserDataServerSender
      - DiseaseSolutionAnalyzerSender
  - type: ActivatableUI
    key: enum.DiseaseDiagnoserConsoleUiKey.Key
  - type: UserInterface
    interfaces:
        enum.DiseaseDiagnoserConsoleUiKey.Key:
          type: DiseaseDiagnoserConsoleBoundUserInterface
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  - type: Damageable
    damageModifierSet: StructuralMetallicStrong
  - type: Injurable
    damageContainer: StructuralInorganic
  - type: DiseaseDiagnoserConsole
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [["Virology"]]
  - type: GuideHelp
    guides:
    - DiseaseEquipment

- type: entity
  id: DiseaseDataServer
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  name: сервер данных вирусологии
  description: Получает и передает информацию об известных вирусах станции.
  components:
  - type: Sprite
    sprite: Structures/Machines/server.rsi
    snapCardinals: true
    layers:
      - state: server-off
      - state: server-on
        visible: false
        map: [ "enum.PowerDeviceVisualLayers.Powered" ]
      - state: variant-crew
        color: "#4169E1"
      - state: server_o
        map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: DeviceNetwork
    deviceNetId: Wired
    receiveFrequencyId: BasicDevice
  - type: DeviceLinkSink
    ports:
      - DiseaseDiagnoserDataServerReceiver
  - type: Construction
    graph: Machine
    node: machine
    containers:
      - machine_board
      - machine_parts
  - type: Machine
    board: ComputerDiagnoserDataServerCircuitboard
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: ApcPowerReceiver
    powerLoad: 200
  - type: ExtensionCableReceiver
  - type: WiresPanel
  - type: WiresVisuals
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 600
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 300
        behaviors:
          - !type:DoActsBehavior
            acts: ["Destruction"]
          - !type:PlaySoundBehavior
            sound:
              collection: MetalGlassBreak
          - !type:SpawnEntitiesBehavior
            spawn:
              SheetSteel1:
                min: 1
                max: 2
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: {visible: true}
          False: {visible: false}
  - type: AmbientOnPowered
  - type: AmbientSound
    volume: -9
    range: 5
    enabled: false
    sound:
      path: /Audio/Ambience/Objects/server_fans.ogg
  - type: GuideHelp
    guides:
    - DiseaseEquipment
  - type: DiseaseDiagnoserDataServer

- type: entity
  id: DiseaseSolutionAnalyzer
  parent: [ BaseMachinePowered, SmallConstructibleMachine ]
  name: анализатор жидкостей
  description: Это устройство анализирует ёмкость с жидкостью на наличие вирусных инфекций.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Modifications/Disease/solution_analyser.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: [machineLayer]
    - state: empty
      map: [containerLayer]
    - state: off_unlit
      map: [terminalLayer]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.DiseaseSolutionContainerAnalyzerVisuals.Status:
        containerLayer:
          Empty: {state: "empty"}
          Fill: {state: "fill"}
      enum.DiseaseSolutionAnalyzerVisuals.Status:
        machineLayer:
          Off: {state: "icon"}
          Scanning: {state: "icon"}
          Denial: {state: "icon"}
          Successfully: {state: "icon"}
        terminalLayer:
          Off: {state: "off_unlit", shader: unshaded}
          On: {state: "on_unlit", shader: unshaded}
          Scanning: {state: "on_unlit", shader: unshaded}
          Denial: {state: "denial_unlit", shader: unshaded}
          Successfully: {state: "successfully_unlit", shader: unshaded}
  - type: Machine
    board: DiseaseSolutionAnalyzerMachineCircuitboard
  - type: DeviceNetwork
    deviceNetId: Wired
    receiveFrequencyId: BasicDevice
  - type: DeviceLinkSink
    ports:
      - DiseaseSolutionAnalyzerReceiver
  - type: DiseaseDiagnoser
  - type: ContainerContainer
    containers:
      flask_container_disease_solution_analyzer: !type:ContainerSlot
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: ItemSlots
    slots:
      flask_container_disease_solution_analyzer:
        whitelist:
          tags:
          - DiagnoserFlask
  - type: DiseaseSolutionAnalyzer
  - type: GuideHelp
    guides:
    - DiseaseEquipment

