- type: entity
  parent:
  - Incorporeal
  - BaseMob
  id: SentientDisease
  name: разумное заболевание
  description: Разум заболевания.
  categories: [ DoNotMap ]
  components:
  - type: Input
    context: "ghost"
  - type: NoFTL
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: KinematicController
  - type: MovementIgnoreGravity
  - type: Examiner
  - type: NoSlip
  - type: Actions
  - type: ContentEye
    maxZoom: 1.5, 1.5
  - type: DoAfter
  - type: Alerts
  - type: NameIdentifier
    group: GenericNumber
  - type: Eye
    pvsScale: 1.5
    drawLight: false
    drawFov: false
    visMask:
      - Normal
      - Ghost
  - type: MovementSpeedModifier
    baseWalkSpeed: 20
    baseSprintSpeed: 10
  - type: Tag
    tags:
    - GhostOnlyWarp
  - type: WarpPoint
    follow: true
    blacklist:
      tags:
      - GhostOnlyWarp
  - type: Visibility
    layer: 2
  - type: Sprite
    sprite: _Modifications/Disease/disease.rsi
    layers:
    - state: icon
      shader: unshaded
      map: ["base"]
  - type: UserInterface
    interfaces:
        enum.DiseaseEvolutionConsoleUiKey.Key:
          type: DiseaseEvolutionConsoleBoundUserInterface
  - type: SentientDisease
    data: 
      mutationPoints: 3000
  - type: GhostTakeoverAvailable
  - type: GhostRole
    allowMovement: true
    allowSpeech: true
    makeSentient: true
    name: ghost-role-information-sentient-disease-name
    description: ghost-role-information-sentient-disease-description
    rules: ghost-role-information-sentient-disease-rules
    mindRoles:
    - MindRoleSentientDisease
    raffle:
      settings: default
    requirements:
    - !type:OverallPlaytimeRequirement
      time: 36000 # 10h overall

- type: entity
  categories: [ HideSpawnMenu, Spawner ]
  parent: BaseAntagSpawner
  id: SpawnPointSentientDisease
  components:
  - type: GhostRoleMobSpawner
    prototype: SentientDisease
  - type: Sprite
    layers:
    - state: green
    - sprite: _Modifications/Disease/disease.rsi
      state: icon

- type: entity
  parent:
  - SentientDisease
  id: DebugSentientDisease
  name: разумное заболевание
  description: Разум заболевания.
  suffix: DEBUG
  categories: [ DoNotMap ]
  components:
  - type: SentientDisease
    data: 
      mutationPoints: 100000