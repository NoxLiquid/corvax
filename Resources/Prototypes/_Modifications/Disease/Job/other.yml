- type: playTimeTracker
  id: JobVirologist

- type: job
  id: Virologist
  name: job-name-virologist
  playTimeTracker: JobVirologist
  startingGear: VirologistGear
  icon: "JobIconVirologist"
  supervisors: job-supervisors-cmo
  access:
  - Medical
  - Virology
  - Maintenance

- type: startingGear
  id: VirologistGear
  equipment:
    id: VirologistPDA
    ears: ClothingHeadsetMedical

- type: chameleonOutfit
  id: VirologistChameleonOutfit
  job: Virologist
  equipment:
    eyes: ClothingEyesHudMedical
    mask: ClothingMaskSterile

- type: entity
  parent: IDCardStandard
  id: IDCardVirologist
  name: ID-карта вирусолога
  components:
  - type: Sprite
    layers:
    - state: default
    - state: stripe_top
      color: "#68aed6"
    - state: stripe_bottom
      color: "#325f7a"
    - sprite: Interface/Misc/job_icons.rsi
      offset: -0.09375, 0.0625
      state: Virologist
  - type: PresetIdCard
    job: Virologist

- type: entity
  parent: BasePDA
  id: VirologistPDA
  name: КПК вирусолога
  description: Интересное у тебя заболевание!
  components:
  - type: Pda
    id: IDCardVirologist
  - type: DiseaseAnalyzer
    scanningEndSound:
      path: "/Audio/Items/Medical/healthscanner.ogg"
  - type: UserInterface
    interfaces:
      enum.DiseaseAnalyzerUiKey.Key:
        type: DiseaseAnalyzerBoundUserInterface
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       pda-virology
  - type: PdaBorderColor
    borderColor: "#817d6f"
    accentVColor: "#12445b"
  - type: Icon
    state: pda-virology