- type: reagent
  id: DiseaseSolution
  name: reagent-name-viral-solution
  group: Toxins
  desc: reagent-desc-viral-solution
  physicalDesc: reagent-physical-desc-clear
  flavor: metallic
  color: "#8ac7ff"
  worksOnTheDead: false
  metabolisms:
    Bloodstream:
      effects:
        - !type:CauseDiseaseEffect
