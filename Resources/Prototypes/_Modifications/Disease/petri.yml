- type: metabolismStage
  id: Petri
  name: metabolism-stage-petri

- type: entity
  parent: SolutionSmall
  id: SolutionPetri
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    id: petri
    solution:
      maxVol: 10

- type: entity
  name: чаша петри
  parent:
  - BaseStructure
  - MobAtmosStandard
  id: PetriDash
  components:
  - type: Transform
    anchored: true
  - type: SolutionManager
    solutions:
    - SolutionPetri
  - type: InjectableSolution
    solution: petri
  - type: Metabolizer
    solutionOnBody: false
    stages: [ Petri ]
    solutions:
      Petri:
        solutionName: petri
        solutionOnBody: false
  - type: Pullable
  - type: Muted
  - type: Physics
    bodyType: Static
  - type: Sprite
    scale: 0.7, 0.7
    noRot: true
    sprite: _Modifications/Disease/petri_dish.rsi
    state: icon
  - type: Damageable
  - type: Injurable
    damageContainer: Inorganic
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Dead
  - type: Appearance
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.20,-0.20,0.20,0.20"
        density: 60
        mask:
        - TabletopMachineMask
        layer:
        - TabletopMachineLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DiseaseMutation
    changeApperance: true
  - type: Tag
    tags: 
    - DiseaseAlwaysInfectable
    - IgnoreCanInfect
    - DiseaseIgnorSymptoms
  - type: ZombieImmune
  - type: Construction
    graph: petri
    node: petriNode