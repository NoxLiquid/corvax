# _Modification-Disease-Start
- type: entity
  id: DiseaseDiagnoserNox
  parent: [ BaseMachinePowered, SmallConstructibleMachine ]
  name: Disease Diagnoser Delta Extreme
  description: A machine that analyzes disease samples.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Modifications/Disease/diagnoser.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: [machineLayer]
    - state: unlit
      map: [terminalLayer]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.DiseaseDiagnoserVisuals.Status:
        machineLayer:
          Off: {state: "icon"}
          On: {state: "icon"}
          Printing: {state: "running"}
          Scanning: {state: "icon"}
          Denial: {state: "icon"}
          Successfully: {state: "icon"}
          GenerateDisease: {state: "icon"}
        terminalLayer:
          Off: {state: "off_unlit", shader: unshaded}
          On: {state: "unlit", shader: unshaded}
          Printing: {state: "unlit", shader: unshaded}
          Scanning: {state: "unlit", shader: unshaded}
          Denial: {state: "denial_unlit", shader: unshaded}
          Successfully: {state: "successfully_unlit", shader: unshaded}
          GenerateDisease: {state: "unlit", shader: unshaded}
  - type: Machine
    board: DiagnoserMachineCircuitboardNox
  - type: DeviceNetwork
    deviceNetId: Wired
    receiveFrequencyId: BasicDevice
  - type: DeviceLinkSink
    ports:
      - DiseaseDiagnoserReceiver
  - type: DiseaseDiagnoser
    paper: DiagnosisReportPaperNox
  - type: ContainerContainer
    containers:
      dna_container_disease_diagnoser: !type:ContainerSlot
      flask_container_disease_diagnoser: !type:ContainerSlot
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: ItemSlots
    slots:
      dna_container_disease_diagnoser:
        whitelist:
          tags:
          - DiagnoserDataCollector
      flask_container_disease_diagnoser:
        whitelist:
          tags:
          - DiagnoserFlask
# _Modification-Disease-End

- type: entity
  name: disease diagnoser report
  parent: Paper
  id: DiagnosisReportPaper
  description: 'A chilling medical receipt.'
  components:
  - type: Sprite
    sprite: Objects/Misc/bureaucracy.rsi
    layers:
    - state: paper_receipt
    - state: paper_receipt_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: PaperVisuals
    backgroundImagePath: "/Textures/Interface/Paper/paper_background_perforated.svg.96dpi.png"
    headerImagePath: "/Textures/Interface/Paper/paper_heading_virus.svg.96dpi.png"
    headerMargin: 0.0, 0.0, 0.0, 6.0
    backgroundImageTile: true
    backgroundPatchMargin: 0.0, 6.0, 0.0, 6.0
    contentMargin: 12.0, 0.0, 12.0, 0.0
    # This is a narrow piece of paper
    maxWritableArea: 128.0, 0.0
